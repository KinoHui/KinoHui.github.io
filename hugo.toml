baseURL = 'https://kinohui.github.io/'
locale = 'zh-cn'
title = "Kino Notes"
theme = 'PaperMod'

[params]
  env = "production"
  description = "源码阅读、云原生与工程笔记"
  defaultTheme = "auto"
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.assets]
    theme = "#00be91"
    favicon = "favicon.svg"

  [params.homeInfoParams]
    Title = "Kino Notes"
    Content = "源码阅读、云原生与工程实践笔记。把复杂系统拆开，看清它们如何工作。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/KinoHui"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
