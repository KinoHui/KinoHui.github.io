baseURL = 'https://kinohui.github.io/'
locale = 'zh-cn'
title = "Kino Notes"
theme = 'PaperMod'
ignoreFiles = ['static/images/og-default\.png$', 'static/images/og-default\.png\.tmp\.png$']

[params]
  env = "production"
  description = "源码阅读、云原生与工程笔记"
  defaultTheme = "auto"
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.assets]
    theme = "#00be91"
    favicon = "favicon.svg"

  [params.homeInfoParams]
    Title = "Kino Notes"
    Content = "源码阅读、云原生与工程实践笔记。把复杂系统拆开，看清它们如何工作。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/KinoHui"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "series"
    name = "系列"
    url = "/series/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 50

  [params.fuseOpts]
    threshold = 0.32
    distance = 120
    limit = 12
    keys = ["title", "permalink", "summary", "content"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 80
  includeNewer = true
  toLower = true

  [[related.indices]]
    name = "series"
    weight = 120
  [[related.indices]]
    name = "tags"
    weight = 90
  [[related.indices]]
    name = "categories"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
